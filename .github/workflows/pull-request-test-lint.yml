name: Test & Lint

on:
  pull_request_target:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  test-and-lint:
    name: Tests & Lint
    runs-on: ubuntu-latest
    # Run the job only if the PR is NOT from Dependabot
    if: ${{ !startsWith(github.actor, 'dependabot') }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type-check TypeScript
        run: yarn typecheck

      - name: Run tests
        run: yarn test

      - name: Run lint
        run: yarn lint

      - name: Build for Lighthouse
        run: yarn build

      - name: Start production server
        run: |
          yarn start &
          yarn wait-on http://localhost:3000 --timeout 30000

      - name: Run Lighthouse CI (desktop)
        run: yarn lhci

      - name: Run Lighthouse CI (mobile)
        run: yarn lhci:mobile

      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps

      - name: Run E2E tests
        run: yarn e2e
        env:
          CI: true

      - name: Auto-merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --delete-branch --auto "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
